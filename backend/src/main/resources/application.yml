server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/taskapp
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

app:
  jwt:
    secret: change-this-dev-secret-change-this-dev-secret
    expirationMinutes: 60
  stripe:
    secretKey: sk_test_replace
    priceIdPro: price_123_replace
    webhookSecret: whsec_replace

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

